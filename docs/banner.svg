<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="undo — Ctrl-Z for AI agents">
  <defs>
    <linearGradient id="g" x1="40" y1="40" x2="240" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818CF8"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="word" x1="210" y1="80" x2="470" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF1FF"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
  </defs>
  <rect width="760" height="220" rx="28" fill="#0B0D12"/>
  <rect x="1" y="1" width="758" height="218" rx="27" stroke="#1C2030"/>

  <!-- logo mark -->
  <g transform="translate(54 54) scale(0.875)">
    <g stroke="url(#g)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M16 64a48 48 0 1 0 48-48 52 52 0 0 0-35.9 14.6L16 42.7"/>
      <path d="M16 16v26.7h26.7"/>
    </g>
    <circle cx="64" cy="64" r="7.5" fill="url(#g)"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="196" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-size="86" font-weight="800" fill="url(#word)" letter-spacing="-2">undo</text>
  <text x="200" y="158" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif" font-size="24" font-weight="500" fill="#8B93A7">Ctrl-Z for AI agents</text>
</svg>
