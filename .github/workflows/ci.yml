name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # --- Rust engine: the trust boundary, verified on Linux, macOS AND Windows ---
      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (engine)
        run: cargo clippy -p undo-core --all-targets -- -D warnings

      - name: cargo test — unit + property + concurrency + CLI (all platforms)
        run: cargo test -p undo-core

      # --- TypeScript / MCP layer (Linux + macOS for now; Windows NAPI packaging is a follow-up) ---
      - name: Set up Node
        if: runner.os != 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm install
        if: runner.os != 'Windows'
        run: npm ci

      - name: Build native engine (NAPI)
        if: runner.os != 'Windows'
        run: npm run build:engine

      - name: Typecheck + build TS
        if: runner.os != 'Windows'
        run: npm run build

      - name: MCP end-to-end smoke test
        if: runner.os != 'Windows'
        run: npm test
