name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- Rust: the engine is the trust boundary, so it gets the strict gate ---
      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (unit + property + concurrency)
        run: cargo test --workspace

      # --- TypeScript / MCP layer ---
      - name: npm install
        run: npm ci

      - name: Build native engine (NAPI)
        run: npm run build:engine

      - name: Typecheck + build TS
        run: npm run build

      - name: MCP end-to-end smoke test
        run: npm test
