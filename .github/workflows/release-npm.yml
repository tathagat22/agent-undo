name: Release npm

# Builds the native NAPI engine for every platform and publishes the npm
# packages (so `npm i walkback` needs no Rust toolchain). Follows the
# canonical napi-rs release flow: build per target -> collect artifacts ->
# `npm publish` (the package's prepublishOnly hook runs `napi prepublish`, which
# publishes the per-platform packages and wires up optionalDependencies).
#
# Requires repo secret NPM_TOKEN and the `@walkback` npm org (see RELEASING.md).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: engine (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    defaults:
      run:
        working-directory: crates/walkback-napi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/walkback-napi/*.node
          if-no-files-found: error

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install deps
        run: npm install

      - name: Download all built addons
        uses: actions/download-artifact@v4
        with:
          path: crates/walkback-napi/artifacts

      # create-npm-dir makes the npm/<platform> dirs; artifacts moves each .node in.
      - name: Collect artifacts into platform packages
        working-directory: crates/walkback-napi
        run: |
          npx napi create-npm-dir -t .
          npx napi artifacts --dir artifacts
          ls -R npm

      # `npm publish` triggers prepublishOnly -> `napi prepublish`, which publishes
      # walkback-engine-<platform> (with --access public) and updates this
      # package's optionalDependencies, then publishes walkback-engine itself.
      - name: Publish walkback-engine (+ platform packages)
        working-directory: crates/walkback-napi
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # The MCP server package depends on walkback-engine published above.
      - name: Publish walkback
        run: |
          npm run build
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
